spring:
  datasource:
    url: jdbc:h2:mem:nexushr;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  cache:
    type: simple
  flyway:
    enabled: false
app:
  security:
    jwt-secret: test-secret-with-at-least-32-characters
