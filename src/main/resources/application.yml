spring:
  application:
    name: nexushr-backend
  threads:
    virtual:
      enabled: true

  # --- Database ---
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexushr}
    username: ${SPRING_DATASOURCE_USERNAME:nexushr}
    password: ${SPRING_DATASOURCE_PASSWORD:nexushr}
  sql:
    init:
      mode: always
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false

  # --- Caching ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis

  # --- Spring AI ---
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}

# --- Server & Monitoring ---
server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

# --- Custom App Security & Notifications ---
app:
  security:
    jwt-secret: ${JWT_SECRET:replace-this-with-at-least-32-characters}
    jwt-ttl-seconds: ${JWT_TTL_SECONDS:3600}
  resend:
    api-key: ${RESEND_API_KEY:}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    phone-number: ${TWILIO_PHONE_NUMBER:}

# --- Sentry Logging ---
sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.1}

logging:
  level:
    org.springframework.security: DEBUG