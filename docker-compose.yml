services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexushr
      POSTGRES_USER: nexushr
      POSTGRES_PASSWORD: nexushr
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexushr"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexushr
      SPRING_DATASOURCE_USERNAME: nexushr
      SPRING_DATASOURCE_PASSWORD: nexushr
      REDIS_HOST: redis
      JWT_SECRET: local-development-secret-with-at-least-32-characters
      OPENAI_API_KEY: ""
#      OPENAI_API_KEY: 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
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data: