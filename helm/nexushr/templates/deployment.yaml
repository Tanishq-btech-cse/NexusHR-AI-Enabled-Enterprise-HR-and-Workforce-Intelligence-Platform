apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexushr.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "nexushr.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "nexushr.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "nexushr.name" . }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "nexushr.fullname" $ }}-secret
                  key: {{ $key }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
