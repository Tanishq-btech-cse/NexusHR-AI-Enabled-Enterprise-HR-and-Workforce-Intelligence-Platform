# Inside helm/nexushr/values.yaml (or deployment.yaml)
image:
  repository: mathpaltanishq/nexushr-backend
  tag: "v1.0.0"
  pullPolicy: Always

replicaCount: 2

service:
  type: ClusterIP
  port: 8080

env:
  SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5433/nexushr
  SPRING_DATASOURCE_USERNAME: nexushr
  SPRING_DATA_REDIS_HOST: host.docker.internal
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_AUTOCONFIGURE_EXCLUDE: org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

secretEnv:
  SPRING_DATASOURCE_PASSWORD: nexushr
  JWT_SECRET: local-development-secret-with-at-least-32-characters
  OPENAI_API_KEY: "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"
  SENTRY_DSN: ""

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi